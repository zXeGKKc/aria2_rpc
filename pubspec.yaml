name: aria2_rpc
description: An aria2 api package developed with dart which can be used in a flutter project, support http and websocket connection to an aria2 jsonrpc server.
version: 0.1.3
homepage: https://github.com/zXeGKKc/aria2_rpc

environment:
  sdk: ^3.12.0

dependencies:
  json_annotation: ^4.12.0
  http: ^1.6.0
  json_rpc_2: ^4.1.0
  web_socket_channel: ^3.0.3
  uuid: ^4.5.2
  meta: ^1.18.0
  collection: ^1.19.1
  

dev_dependencies:
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  lints: ^6.0.0
  test: ^1.25.6
  path: ^1.9.1
